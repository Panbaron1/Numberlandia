name: numberlandia
description: A number exploration app for children.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.3.2
  audioplayers: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/pop.wav
    - assets/sounds/chime.wav
    - assets/cards/
  fonts:
    - family: Fredoka
      fonts:
        - asset: assets/fonts/Fredoka.ttf
