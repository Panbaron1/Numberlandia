name: numberlandia
description: A number exploration app for children.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.3.2
  audioplayers: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#21262B"
  adaptive_icon_foreground: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/pop.wav
    - assets/sounds/chime.wav
    - assets/cards/
  fonts:
    - family: Fredoka
      fonts:
        - asset: assets/fonts/Fredoka.ttf
